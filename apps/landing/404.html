<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 — Diffgazer</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      @font-face {
        font-family: "Departure Mono";
        src: url("/fonts/DepartureMono-Regular.woff2") format("woff2");
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        font-family: "Departure Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #09090b;
        color: #f4f4f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgb(255 255 255 / 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 0.035) 1px, transparent 1px),
          #09090b;
        background-size: 32px 32px;
      }

      main {
        width: min(680px, 100%);
        border: 1px solid #3f3f46;
        background: rgb(9 9 11 / 0.92);
        padding: clamp(28px, 7vw, 64px);
        box-shadow: 12px 12px 0 #18181b;
      }

      .status {
        color: #a1a1aa;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 24px 0 16px;
        font-size: clamp(34px, 8vw, 72px);
        font-weight: 400;
        line-height: 0.98;
        text-transform: uppercase;
      }

      p {
        max-width: 48ch;
        margin: 0;
        color: #a1a1aa;
        line-height: 1.7;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 22px;
        margin-top: 36px;
      }

      a {
        color: #f4f4f5;
        text-underline-offset: 4px;
      }

      a:hover {
        color: #93c5fd;
      }

      a:focus-visible {
        outline: 2px solid #f4f4f5;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status">Diffgazer / HTTP 404</div>
      <h1>Page not found.</h1>
      <p>The requested review target is not here. Return home or continue with the docs.</p>
      <nav aria-label="Recovery links">
        <a href="/">[ home ]</a>
        <a href="%VITE_DOCS_ORIGIN%">[ docs ]</a>
        <a href="%VITE_GITHUB_URL%">[ github ]</a>
      </nav>
    </main>
  </body>
</html>
