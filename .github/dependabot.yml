version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/deploy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docker-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/cli/*"
      - "/libs/*"
      - "/libs/keys/artifacts"
      - "/libs/keys/examples/playground"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Workspace packages version independently; bump declared ranges in the
    # manifest that owns the dependency rather than widening a shared range.
    versioning-strategy: increase
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # Majors are grouped (not ungrouped per-dependency) so the public-API
      # blast radius of each major is reviewed in one PR per cadence.
      major:
        update-types:
          - "major"
