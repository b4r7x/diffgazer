name: Feature request
description: Propose a new capability or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim the project rules: [CONTRIBUTING.md](https://github.com/b4r7x/diffgazer/blob/main/CONTRIBUTING.md) and [AGENTS.md](https://github.com/b4r7x/diffgazer/blob/main/AGENTS.md).
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve and who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch the API, behavior, or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.
    validations:
      required: false
