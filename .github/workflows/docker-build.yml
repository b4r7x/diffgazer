name: Docker Build

on:
  pull_request:
    paths:
      - .dockerignore
      - Dockerfile
      - deploy/**
      - apps/docs/**
      - apps/landing/**
      - libs/**
      - cli/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/docker-build.yml
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - Dockerfile
      - deploy/**
      - apps/docs/**
      - apps/landing/**
      - libs/**
      - cli/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/docker-build.yml

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: docs
            dockerfile: Dockerfile
          - image: registry
            dockerfile: deploy/registry.Dockerfile
          - image: landing
            dockerfile: deploy/landing.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        run: docker build --pull -f "${{ matrix.dockerfile }}" -t "diffgazer-${{ matrix.image }}:ci" .
