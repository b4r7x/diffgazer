name: Release Readiness

# Verification only. Production deploys are started manually from deploy.yml.
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  history-secret-scan:
    name: Full History Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks full-history scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  verify:
    name: Build, Verify, and Pack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repo
        uses: ./.github/actions/setup-repo

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

      - name: Secret scan
        run: pnpm run secret-scan

      - name: Build
        run: pnpm run build

      - name: Check published packages (publint + attw)
        run: pnpm run check:packages

      - name: Public registry is up to date
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi

      - name: Verify
        run: DIFFGAZER_SMOKE_ALLOW_NETWORK=1 DIFFGAZER_SMOKE_STRICT_SKIPS=1 pnpm run verify

      - name: Package smoke
        run: DIFFGAZER_SMOKE_ALLOW_NETWORK=1 DIFFGAZER_SMOKE_STRICT_SKIPS=1 pnpm run smoke:packages

      - name: Hosted registry live smoke
        run: pnpm run registry:live-check

      - name: Dirty-tree guard (post-verify and smoke)
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            echo "::error::Tree is dirty after verify/smoke steps"
            echo "$status"
            exit 1
          fi

      - name: Changeset status
        # Meaningful only on PRs: on push-to-main `--since=origin/main` diffs HEAD
        # against itself (vacuous), and a `--since <tag>` variant would go red on
        # the Version-PR merge commit that release.yml's workflow_run gate needs
        # green. Only the repository-owned Version PR created by the trusted
        # Changesets bot is exempt because it has consumed its changesets.
        if: >-
          ${{ github.event_name == 'pull_request'
          && (github.head_ref != 'changeset-release/main'
          || github.event.pull_request.head.repo.full_name != github.repository
          || github.event.pull_request.user.login != 'github-actions[bot]') }}
        run: pnpm changeset status --since=origin/main

      - name: Pack @diffgazer/add
        run: pnpm --filter @diffgazer/add pack --dry-run

      - name: Pack @diffgazer/ui
        run: pnpm --filter @diffgazer/ui pack --dry-run

      - name: Pack @diffgazer/keys
        run: pnpm --filter @diffgazer/keys pack --dry-run

      - name: Pack diffgazer
        run: pnpm --filter diffgazer pack --dry-run

      - name: Dirty-tree guard (post-pack)
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            echo "::error::Tree is dirty after pack steps"
            echo "$status"
            exit 1
          fi

  e2e:
    name: Browser E2E (Playwright + axe + visual)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup repo
        uses: ./.github/actions/setup-repo

      - name: Install Chromium
        run: pnpm --filter @diffgazer/docs exec playwright install --with-deps chromium

      - name: Build docs
        run: pnpm --filter @diffgazer/docs build

      - name: Run Docs Playwright tests
        env:
          CI: "true"
        run: pnpm --filter @diffgazer/docs test:e2e

      - name: Run Web Playwright tests
        env:
          CI: "true"
        run: pnpm --filter @diffgazer/web test:e2e

      - name: Run UI Playwright tests
        env:
          CI: "true"
        run: pnpm --filter @diffgazer/ui test:e2e

      - name: Run Lighthouse budgets
        run: pnpm --filter @diffgazer/docs lighthouse

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-reports
          path: |
            apps/docs/playwright-report
            apps/web/playwright-report
            libs/ui/playwright-report
          retention-days: 14

      - name: Upload Playwright traces and results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: |
            apps/docs/test-results
            apps/web/test-results
            libs/ui/test-results
          retention-days: 14
