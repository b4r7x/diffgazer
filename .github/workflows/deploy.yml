name: Deploy Public Surfaces

on:
  workflow_dispatch:
    inputs:
      target:
        description: Public surfaces to deploy
        required: true
        default: docs-registry
        type: choice
        options:
          - docs-registry
          - landing
          - all
      confirm_production:
        description: Type "deploy" to confirm production deployment
        required: true
        type: string
      image_sha:
        description: >-
          Optional rollback: full 40-char commit SHA of a previously built and
          deployed image. When set, that SHA's existing GHCR images are
          re-promoted to :prod instead of building from main HEAD.
        required: false
        type: string

concurrency:
  group: deploy-public-surfaces-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-request:
    name: Validate Manual Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      # SHA actually deployed: the rollback image_sha when provided, else HEAD.
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      # "true" when rolling back to a pre-built image (skips build-scan).
      rollback: ${{ steps.resolve.outputs.rollback }}
    steps:
      - name: Require production confirmation
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          if [ "${CONFIRM_PRODUCTION}" != "deploy" ]; then
            echo "::error::confirm_production must equal 'deploy'."
            exit 1
          fi

      - name: Require main branch
        env:
          DEPLOY_REF: ${{ github.ref }}
        run: |
          if [ "${DEPLOY_REF}" != "refs/heads/main" ]; then
            echo "::error::Production deploys must run from refs/heads/main."
            exit 1
          fi

      - name: Resolve target SHA
        id: resolve
        env:
          IMAGE_SHA: ${{ inputs.image_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${IMAGE_SHA}" ]; then
            if ! printf '%s' "${IMAGE_SHA}" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::error::image_sha must be a full 40-character lowercase commit SHA."
              exit 1
            fi
            echo "target_sha=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"
            echo "rollback=true" >> "$GITHUB_OUTPUT"
          else
            echo "target_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "rollback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require Release Readiness success for target SHA
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          set -euo pipefail

          run_info="$(gh api \
            "repos/${{ github.repository }}/actions/workflows/release-readiness.yml/runs?head_sha=${TARGET_SHA}&per_page=20" \
            --jq '[.workflow_runs[] | select(.event == "push" and .head_branch == "main" and .status == "completed")] | sort_by(.run_started_at // .created_at) | last | select(. != null) | [.id, .conclusion, .html_url] | @tsv')"
          if [ -z "${run_info}" ]; then
            echo "::error::No completed Release Readiness run found on main for ${TARGET_SHA}."
            exit 1
          fi

          IFS=$'\t' read -r run_id run_conclusion run_url <<< "${run_info}"
          if [ "${run_conclusion}" != "success" ]; then
            echo "::error::Release Readiness for ${TARGET_SHA} concluded '${run_conclusion}', not success: ${run_url}"
            exit 1
          fi

          jobs="$(gh api \
            "repos/${{ github.repository }}/actions/runs/${run_id}/jobs?per_page=100" \
            --jq '.jobs[] | [.name, .conclusion] | @tsv')"
          expected_jobs=(
            "Full History Secret Scan"
            "Build, Verify, and Pack"
            "Browser E2E (Playwright + axe + visual)"
          )
          for expected_job in "${expected_jobs[@]}"; do
            conclusion="$(awk -F '\t' -v job="${expected_job}" '$1 == job { print $2 }' <<< "${jobs}" | tail -n 1)"
            if [ -z "${conclusion}" ]; then
              echo "::error::Release Readiness job '${expected_job}' is missing for ${TARGET_SHA}: ${run_url}"
              exit 1
            fi
            if [ "${conclusion}" != "success" ]; then
              echo "::error::Release Readiness job '${expected_job}' concluded '${conclusion}', not success: ${run_url}"
              exit 1
            fi
          done
          echo "Release Readiness run ${run_id} is green for ${TARGET_SHA}."

  build-scan:
    name: Build and Scan ${{ matrix.service.name }}
    needs: validate-request
    # Rollback re-promotes pre-built images, so the build matrix is skipped.
    if: ${{ needs.validate-request.outputs.rollback != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: docs
            dockerfile: Dockerfile
            image: diffgazer-docs
            port: "3000"
            targets: docs-registry,all
          - name: registry
            dockerfile: deploy/registry.Dockerfile
            image: diffgazer-registry
            port: "8080"
            targets: docs-registry,all
          - name: landing
            dockerfile: deploy/landing.Dockerfile
            image: diffgazer-landing
            port: "8080"
            targets: landing,all
    env:
      IMAGE_REF: ghcr.io/b4r7x/${{ matrix.service.image }}:${{ github.sha }}
    steps:
      - name: Checkout
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2e3ecddb7b43c4e34e7e # v3.10.0

      - name: Stamp public source identity
        if: >-
          ${{ contains(matrix.service.targets, inputs.target)
            && matrix.service.name != 'registry' }}
        env:
          SERVICE_NAME: ${{ matrix.service.name }}
          SOURCE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          case "${SERVICE_NAME}" in
            docs) destination="apps/docs/public/source-tag" ;;
            landing) destination="apps/landing/public/source-tag" ;;
            *) echo "::error::Unsupported identity surface: ${SERVICE_NAME}"; exit 1 ;;
          esac
          printf '%s\n' "${SOURCE_TAG}" > "${destination}"

      - name: Log in to GHCR
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7a67f568d # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA image
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.service.image }}
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed SHA image
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  promote-deploy:
    name: Promote and Deploy
    needs: [validate-request, build-scan]
    # build-scan is skipped on rollback; require validate-request success and
    # build-scan to have either succeeded (fresh deploy) or been skipped (rollback).
    if: >-
      ${{ always()
        && needs.validate-request.result == 'success'
        && (needs.build-scan.result == 'success' || needs.build-scan.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_OWNER: ghcr.io/b4r7x
      DEPLOY_TARGET: ${{ inputs.target }}
      SOURCE_TAG: ${{ needs.validate-request.outputs.target_sha }}
      ROLLBACK: ${{ needs.validate-request.outputs.rollback }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USERNAME: ${{ github.actor }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_WEBHOOK_DOCS: ${{ secrets.COOLIFY_WEBHOOK_DOCS }}
      COOLIFY_WEBHOOK_REGISTRY: ${{ secrets.COOLIFY_WEBHOOK_REGISTRY }}
      COOLIFY_WEBHOOK_LANDING: ${{ secrets.COOLIFY_WEBHOOK_LANDING }}
    steps:
      - name: Checkout deployed SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate-request.outputs.target_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Promote scanned images and trigger Coolify
        run: |
          set -Eeuo pipefail

          require_env() {
            name="$1"
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required environment value: ${name}"
              exit 1
            fi
          }

          require_selected_secrets() {
            require_env GHCR_TOKEN
            require_env COOLIFY_TOKEN

            case "${DEPLOY_TARGET}" in
              docs-registry)
                require_env COOLIFY_WEBHOOK_DOCS
                require_env COOLIFY_WEBHOOK_REGISTRY
                ;;
              landing)
                require_env COOLIFY_WEBHOOK_LANDING
                ;;
              all)
                require_env COOLIFY_WEBHOOK_DOCS
                require_env COOLIFY_WEBHOOK_REGISTRY
                require_env COOLIFY_WEBHOOK_LANDING
                ;;
              *)
                echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
                exit 1
                ;;
            esac
          }

          promote() {
            image="$1"
            # On rollback the source image was built by an earlier run; fail with a
            # clear message if its manifest is missing for the requested SHA.
            if [ "${ROLLBACK}" = "true" ]; then
              if ! docker buildx imagetools inspect "${IMAGE_OWNER}/${image}:${SOURCE_TAG}" > /dev/null 2>&1; then
                echo "::error::No GHCR image ${IMAGE_OWNER}/${image}:${SOURCE_TAG} to roll back to."
                return 1
              fi
            fi
            docker buildx imagetools create \
              --tag "${IMAGE_OWNER}/${image}:prod" \
              "${IMAGE_OWNER}/${image}:${SOURCE_TAG}"
          }

          trigger() {
            name="$1"
            webhook="$2"
            if [ "$#" -ge 3 ]; then
              source_ref="$3"
            else
              source_ref="${SOURCE_TAG}"
            fi
            payload="{\"image_tag\":\"prod\",\"surface\":\"${name}\"}"
            if [ -n "${source_ref}" ]; then
              payload="{\"image_tag\":\"prod\",\"source_sha\":\"${source_ref}\",\"surface\":\"${name}\"}"
            fi
            curl -fsS -X POST "$webhook" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          }

          require_selected_secrets
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          case "${DEPLOY_TARGET}" in
            docs-registry)
              selected_services=(docs registry)
              selected_images=(diffgazer-docs diffgazer-registry)
              selected_webhooks=("${COOLIFY_WEBHOOK_DOCS}" "${COOLIFY_WEBHOOK_REGISTRY}")
              ;;
            landing)
              selected_services=(landing)
              selected_images=(diffgazer-landing)
              selected_webhooks=("${COOLIFY_WEBHOOK_LANDING}")
              ;;
            all)
              selected_services=(docs registry landing)
              selected_images=(diffgazer-docs diffgazer-registry diffgazer-landing)
              selected_webhooks=(
                "${COOLIFY_WEBHOOK_DOCS}"
                "${COOLIFY_WEBHOOK_REGISTRY}"
                "${COOLIFY_WEBHOOK_LANDING}"
              )
              ;;
            *)
              echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
              exit 1
              ;;
          esac

          declare -A previous_digests=()
          declare -A images_by_service=()
          declare -A webhooks_by_service=()
          declare -a changed_services=()

          for index in "${!selected_services[@]}"; do
            service="${selected_services[index]}"
            image="${selected_images[index]}"
            webhook="${selected_webhooks[index]}"
            digest="$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' \
              "${IMAGE_OWNER}/${image}:prod")"
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::Could not capture current production digest for ${service}."
              exit 1
            fi
            previous_digests["${service}"]="${digest}"
            images_by_service["${service}"]="${image}"
            webhooks_by_service["${service}"]="${webhook}"
          done

          rollback_deployment() {
            original_status=$?
            trap - EXIT
            trap '' HUP INT TERM
            set +e

            for ((index=${#changed_services[@]} - 1; index >= 0; index--)); do
              service="${changed_services[index]}"
              image="${images_by_service[${service}]}"
              digest="${previous_digests[${service}]}"
              webhook="${webhooks_by_service[${service}]}"

              if ! docker buildx imagetools create \
                --tag "${IMAGE_OWNER}/${image}:prod" \
                "${IMAGE_OWNER}/${image}@${digest}"; then
                echo "::error::Failed to restore ${service} to ${digest}."
                continue
              fi
              if ! trigger "${service}" "${webhook}" ""; then
                echo "::error::Restored ${service} to ${digest}, but its rollback trigger failed."
              fi
            done

            exit "${original_status}"
          }
          trap rollback_deployment EXIT
          trap 'exit 129' HUP
          trap 'exit 130' INT
          trap 'exit 143' TERM

          for index in "${!selected_services[@]}"; do
            service="${selected_services[index]}"
            changed_services+=("${service}")
            promote "${selected_images[index]}"
          done

          for index in "${!selected_services[@]}"; do
            trigger "${selected_services[index]}" "${selected_webhooks[index]}"
          done

          sleep 30

          node scripts/monorepo/verify-deployed-source-tags.mjs

          case "${DEPLOY_TARGET}" in
            docs-registry)
              DIFFGAZER_LIVE_REGISTRY_REQUIRED=1 node scripts/monorepo/check-live-registry.mjs
              ;;
            landing)
              ;;
            all)
              DIFFGAZER_LIVE_REGISTRY_REQUIRED=1 node scripts/monorepo/check-live-registry.mjs
              ;;
            *)
              echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
              exit 1
              ;;
          esac

          trap - EXIT HUP INT TERM
