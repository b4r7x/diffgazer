name: Deploy Public Surfaces

on:
  workflow_dispatch:
    inputs:
      target:
        description: Public surfaces to deploy
        required: true
        default: docs-registry
        type: choice
        options:
          - docs-registry
          - landing
          - all
      confirm_production:
        description: Type "deploy" to confirm production deployment
        required: true
        type: string

concurrency:
  group: deploy-public-surfaces-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-request:
    name: Validate Manual Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Require production confirmation
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          if [ "${CONFIRM_PRODUCTION}" != "deploy" ]; then
            echo "::error::confirm_production must equal 'deploy'."
            exit 1
          fi

      - name: Require main branch
        env:
          DEPLOY_REF: ${{ github.ref }}
        run: |
          if [ "${DEPLOY_REF}" != "refs/heads/main" ]; then
            echo "::error::Production deploys must run from refs/heads/main."
            exit 1
          fi

  build-scan:
    name: Build and Scan ${{ matrix.service.name }}
    needs: validate-request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: docs
            dockerfile: Dockerfile
            image: diffgazer-docs
            port: "3000"
            targets: docs-registry,all
          - name: registry
            dockerfile: deploy/registry.Dockerfile
            image: diffgazer-registry
            port: "8080"
            targets: docs-registry,all
          - name: landing
            dockerfile: deploy/landing.Dockerfile
            image: diffgazer-landing
            port: "8080"
            targets: landing,all
    env:
      IMAGE_REF: ghcr.io/b4r7x/${{ matrix.service.image }}:${{ github.sha }}
    steps:
      - name: Checkout
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2e3ecddb7b43c4e34e7e # v3.10.0

      - name: Log in to GHCR
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7a67f568d # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA image
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_REF }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.service.image }}
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed SHA image
        if: ${{ contains(matrix.service.targets, inputs.target) }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  promote-deploy:
    name: Promote and Deploy
    needs: build-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      packages: write
    env:
      IMAGE_OWNER: ghcr.io/b4r7x
      DEPLOY_TARGET: ${{ inputs.target }}
      SOURCE_TAG: ${{ github.sha }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USERNAME: ${{ github.actor }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_WEBHOOK_DOCS: ${{ secrets.COOLIFY_WEBHOOK_DOCS }}
      COOLIFY_WEBHOOK_REGISTRY: ${{ secrets.COOLIFY_WEBHOOK_REGISTRY }}
      COOLIFY_WEBHOOK_LANDING: ${{ secrets.COOLIFY_WEBHOOK_LANDING }}
    steps:
      - name: Promote scanned images and trigger Coolify
        run: |
          set -euo pipefail

          require_env() {
            name="$1"
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required environment value: ${name}"
              exit 1
            fi
          }

          require_selected_secrets() {
            require_env GHCR_TOKEN
            require_env COOLIFY_TOKEN

            case "${DEPLOY_TARGET}" in
              docs-registry)
                require_env COOLIFY_WEBHOOK_DOCS
                require_env COOLIFY_WEBHOOK_REGISTRY
                ;;
              landing)
                require_env COOLIFY_WEBHOOK_LANDING
                ;;
              all)
                require_env COOLIFY_WEBHOOK_DOCS
                require_env COOLIFY_WEBHOOK_REGISTRY
                require_env COOLIFY_WEBHOOK_LANDING
                ;;
              *)
                echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
                exit 1
                ;;
            esac
          }

          promote() {
            image="$1"
            docker buildx imagetools create \
              --tag "${IMAGE_OWNER}/${image}:prod" \
              "${IMAGE_OWNER}/${image}:${SOURCE_TAG}"
          }

          trigger() {
            name="$1"
            webhook="$2"
            curl -fsS -X POST "$webhook" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"image_tag\":\"prod\",\"source_sha\":\"${SOURCE_TAG}\",\"surface\":\"${name}\"}"
          }

          require_selected_secrets
          printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          case "${DEPLOY_TARGET}" in
            docs-registry)
              promote diffgazer-docs
              promote diffgazer-registry
              trigger docs "${COOLIFY_WEBHOOK_DOCS}"
              trigger registry "${COOLIFY_WEBHOOK_REGISTRY}"
              ;;
            landing)
              promote diffgazer-landing
              trigger landing "${COOLIFY_WEBHOOK_LANDING}"
              ;;
            all)
              promote diffgazer-docs
              promote diffgazer-registry
              promote diffgazer-landing
              trigger docs "${COOLIFY_WEBHOOK_DOCS}"
              trigger registry "${COOLIFY_WEBHOOK_REGISTRY}"
              trigger landing "${COOLIFY_WEBHOOK_LANDING}"
              ;;
            *)
              echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
              exit 1
              ;;
          esac

      - name: Verify selected public endpoints
        run: |
          set -euo pipefail
          sleep 30

          check() {
            curl -fsS --retry 5 --retry-delay 15 "$1" > /dev/null
          }

          case "${DEPLOY_TARGET}" in
            docs-registry)
              check https://docs.b4r7.dev
              check https://r.b4r7.dev/r/ui/registry.json
              check https://r.b4r7.dev/r/ui/button.json
              ;;
            landing)
              check https://diffgazer.b4r7.dev
              ;;
            all)
              check https://docs.b4r7.dev
              check https://r.b4r7.dev/r/ui/registry.json
              check https://r.b4r7.dev/r/ui/button.json
              check https://diffgazer.b4r7.dev
              ;;
            *)
              echo "::error::Unknown deploy target: ${DEPLOY_TARGET}"
              exit 1
              ;;
          esac
