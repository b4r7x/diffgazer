name: Release

on:
  workflow_run:
    workflows: ["Release Readiness"]
    branches:
      - main
    types:
      - completed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version or Publish
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup repo
        uses: ./.github/actions/setup-repo
        with:
          registry-url: https://registry.npmjs.org
          scope: '@diffgazer'

      - name: Release readiness gate
        run: pnpm run release-check

      - name: Version PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        # NPM_TOKEN is consumed only when changesets/action takes the publish branch
        # (i.e. after the Version PR is merged); it is unused on the version branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
