name: Release

on:
  workflow_run:
    workflows: ["Release Readiness"]
    branches:
      - main
    types:
      - completed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version or Publish
    # Only publish from trusted push provenance on this repository's main
    # branch. A `pull_request`-origin Release Readiness run (including a fork
    # whose head branch is named `main`) must never reach this privileged,
    # OIDC- and npm-token-bearing job or its `head_sha` checkout.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_repository.full_name == github.repository
      && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup repo
        uses: ./.github/actions/setup-repo
        with:
          registry-url: https://registry.npmjs.org
          scope: '@diffgazer'

      - name: Release readiness gate
        run: pnpm run release-check

      - name: Version PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        # NPM_TOKEN is consumed only when changesets/action takes the publish branch
        # (i.e. after the Version PR is merged); it is unused on the version branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
