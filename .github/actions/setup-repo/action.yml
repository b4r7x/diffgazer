name: Setup repo
description: Install pnpm (version from root packageManager), Node 22 with pnpm cache, and frozen-lockfile dependencies.

inputs:
  registry-url:
    description: Optional npm registry URL to write into .npmrc (release job only, enables NODE_AUTH_TOKEN auth).
    required: false
  scope:
    description: Optional npm scope to pair with registry-url.
    required: false

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}

    - name: Install
      run: pnpm install --frozen-lockfile
      shell: bash
