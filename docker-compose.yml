services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REGISTRY_ORIGIN: ${REGISTRY_ORIGIN:-https://r.b4r7.dev}
        VITE_PUBLIC_ORIGIN: ${VITE_PUBLIC_ORIGIN:-https://docs.b4r7.dev}
        VITE_REGISTRY_ORIGIN: ${VITE_REGISTRY_ORIGIN:-https://r.b4r7.dev}
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - diffgazer

  registry:
    build:
      context: .
      dockerfile: deploy/registry.Dockerfile
    ports:
      - "127.0.0.1:8081:8080"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/r/ui/registry.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - diffgazer

  landing:
    build:
      context: .
      dockerfile: deploy/landing.Dockerfile
      args:
        VITE_DOCS_ORIGIN: ${VITE_DOCS_ORIGIN:-https://docs.b4r7.dev}
    ports:
      - "127.0.0.1:8082:8080"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - diffgazer

networks:
  diffgazer:
    driver: bridge
