services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REGISTRY_ORIGIN: ${REGISTRY_ORIGIN:-https://r.b4r7.dev}
        VITE_PUBLIC_ORIGIN: ${VITE_PUBLIC_ORIGIN:-https://docs.b4r7.dev}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - diffgazer

  registry:
    build:
      context: .
      dockerfile: deploy/registry.Dockerfile
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/r/ui/registry.json"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - diffgazer

  landing:
    build:
      context: .
      dockerfile: deploy/landing.Dockerfile
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - diffgazer

  hub:
    build:
      context: .
      dockerfile: deploy/hub.Dockerfile
    ports:
      - "8083:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - diffgazer

networks:
  diffgazer:
    driver: bridge
