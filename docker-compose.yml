services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REGISTRY_ORIGIN: ${REGISTRY_ORIGIN:-https://diffgazer.com}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
