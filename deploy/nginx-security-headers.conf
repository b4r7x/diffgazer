# Shared security header emission.
#
# nginx header directives do not inherit across blocks: a location or `if` block
# that sets ANY header drops every server-level header. This snippet is therefore
# included in every block that emits headers. Each server sets the policy values
# before the include so CSP/XFO can fit the surface while header directives stay
# centralized.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "$security_frame_options" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "$security_content_security_policy" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;
