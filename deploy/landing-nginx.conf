server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain text/xml;
    gzip_min_length 256;
    gzip_vary on;

    set $security_frame_options "SAMEORIGIN";
    set $security_content_security_policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'";

    # Security headers (server-level; the include is repeated in blocks that set
    # Cache-Control because nginx headers do not inherit once a block sets a
    # header).
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        include /etc/nginx/snippets/security-headers.conf;

        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    location ^~ /assets/ {
        alias /usr/share/nginx/html/assets/;
        include /etc/nginx/snippets/security-headers.conf;

        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2?|ttf|eot)$ {
        include /etc/nginx/snippets/security-headers.conf;

        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
