limit_req_zone $binary_remote_addr zone=registry:10m rate=60r/m;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers (server-level; repeated in location blocks because
    # nginx add_header in a location block does not inherit server-block headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

    # Default: reject everything not explicitly allowed
    location / { return 404; }

    location = /favicon.ico { return 204; }

    location ^~ /schema/ {
        default_type application/schema+json;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location ^~ /r/ui/ {
        limit_req zone=registry burst=20 nodelay;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;

        types { application/json json; }
        default_type application/json;

        if ($request_method = OPTIONS) {
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'";
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        limit_except GET HEAD OPTIONS {
            deny all;
        }
    }

    location ^~ /r/keys/ {
        limit_req zone=registry burst=20 nodelay;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;

        types { application/json json; }
        default_type application/json;

        if ($request_method = OPTIONS) {
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'";
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        limit_except GET HEAD OPTIONS {
            deny all;
        }
    }
}
