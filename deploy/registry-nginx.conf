limit_req_zone $binary_remote_addr zone=registry:10m rate=10r/s;

# The registry sits behind Coolify's Traefik, which terminates TLS. Without
# real_ip the limit key is the proxy peer, making the budget global across all
# clients; recover the per-client address from the forwarded header for the
# private docker/VPS ranges Traefik forwards from.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain text/xml;
    gzip_min_length 256;
    gzip_vary on;

    set $security_frame_options "DENY";
    set $security_content_security_policy "default-src 'none'; frame-ancestors 'none'";

    # Security headers (server-level; the include is repeated in every location
    # and OPTIONS block because nginx headers do not inherit once a block
    # sets any header of its own).
    include /etc/nginx/snippets/security-headers.conf;

    # Default: reject everything not explicitly allowed
    location / { return 404; }

    location = /favicon.ico { return 204; }

    location ^~ /schema/ {
        default_type application/schema+json;

        include /etc/nginx/snippets/security-headers.conf;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location ^~ /r/ui/ {
        limit_req zone=registry burst=100 nodelay;

        include /etc/nginx/snippets/security-headers.conf;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;

        types { application/json json; }
        default_type application/json;

        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/security-headers.conf;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        limit_except GET HEAD OPTIONS {
            deny all;
        }
    }

    location ^~ /r/keys/ {
        limit_req zone=registry burst=100 nodelay;

        include /etc/nginx/snippets/security-headers.conf;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;

        types { application/json json; }
        default_type application/json;

        if ($request_method = OPTIONS) {
            include /etc/nginx/snippets/security-headers.conf;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        limit_except GET HEAD OPTIONS {
            deny all;
        }
    }
}
